<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMENTS.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Design System Tokens --- */
        :root {
            --background: #FFFFFF;
            --surface: #F5F7FF;
            --blue-primary: #1A56FF;
            --blue-soft: #E8EEFF;
            --ink: #0A0A0F;
            --muted: #6B7280;
            --border: #E2E6F0;
            --danger: #EF4444;
            
            --font-display: 'Syne', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --background: #0A0A0F;
            --surface: #13131A;
            --blue-primary: #3D6FFF;
            --blue-soft: #1A1F3A;
            --ink: #F0F0F5;
            --muted: #9CA3AF;
            --border: #1E1E2E;
            --danger: #F87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                        color 150ms ease;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--background);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 32px 24px;
        }

        /* --- Minimal Layout Header --- */
        header {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-nav {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            user-select: none;
        }

        .logo-nav span {
            color: var(--blue-primary);
        }

        .theme-toggle-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            border-radius: 50%;
        }

        .theme-toggle-btn:hover {
            background-color: var(--surface);
        }

        /* --- Centered Form Field Wrapper --- */
        main {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: auto 0;
        }

        .brand-hero {
            font-family: var(--font-display);
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 8px;
        }

        .brand-hero span {
            color: var(--blue-primary);
        }

        .field-prompt {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: var(--ink);
            letter-spacing: -0.2px;
        }

        .input-container {
            position: relative;
            width: 100%;
        }

        .username-field {
            width: 100%;
            padding: 16px 24px;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            background-color: var(--surface);
            color: var(--ink);
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .username-field:focus {
            border-color: var(--blue-primary);
        }

        .username-field::placeholder {
            color: var(--muted);
            opacity: 0.5;
        }

        .submit-action-btn {
            width: 100%;
            padding: 16px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            background-color: var(--blue-primary);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .submit-action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-log {
            font-size: 12px;
            color: var(--danger);
            text-align: center;
            min-height: 16px;
        }

        /* --- Bottom Spec Hint --- */
        footer {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            max-width: 320px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-nav">MOMENTS<span>.</span></div>
        <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle visual theme state">
            <svg id="themeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"></svg>
        </button>
    </header>

    <main>
        <h1 class="brand-hero">MOMENTS<span>.</span></h1>
        
        <p class="field-prompt">What should we call you?</p>
        
        <div class="input-container">
            <input 
                type="text" 
                id="usernameInput" 
                class="username-field" 
                placeholder="username" 
                maxlength="20"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
            >
        </div>

        <div id="errorLog" class="error-log"></div>

        <button id="submitBtn" class="submit-action-btn" disabled>Enter Moments.</button>
    </main>

    <footer>
        * You can use your real name or stay anonymous. Up to you.
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        import { firebaseConfig } from "./js/firebase.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const usernameInput = document.getElementById('usernameInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorLog = document.getElementById('errorLog');

        const formatCriteria = /^[a-zA-Z0-9_]{2,20}$/;

        usernameInput.addEventListener('input', () => {
            const rawValue = usernameInput.value.trim();
            
            if (rawValue.length === 0) {
                submitBtn.disabled = true;
                errorLog.textContent = "";
            } else if (!formatCriteria.test(rawValue)) {
                submitBtn.disabled = true;
                errorLog.textContent = "Use 2-20 characters (letters, numbers, or underscores only).";
            } else {
                submitBtn.disabled = false;
                errorLog.textContent = "";
            }
        });

        submitBtn.addEventListener('click', async () => {
            const targetName = usernameInput.value.trim();
            if (!formatCriteria.test(targetName)) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "Entering...";

            try {
                const credential = await signInAnonymously(auth);
                
                await setDoc(doc(db, "users", credential.user.uid), {
                    username: targetName,
                    joinedAt: new Date().toISOString()
                });

                window.location.href = "feed.html";

            } catch (err) {
                console.error("Pipeline failure: ", err);
                errorLog.textContent = "Could not map username session. Try a different variant.";
                submitBtn.disabled = false;
                submitBtn.textContent = "Enter Moments.";
            }
        });
    </script>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        const activeSelection = localStorage.getItem('moments-theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        document.documentElement.setAttribute('data-theme', activeSelection);
        paintToggleStateIcon(activeSelection);

        themeToggle.addEventListener('click', () => {
            const currentScope = document.documentElement.getAttribute('data-theme');
            const swapTarget = currentScope === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', swapTarget);
            localStorage.setItem('moments-theme', swapTarget);
            paintToggleStateIcon(swapTarget);
        });

        function paintToggleStateIcon(activeTheme) {
            if (activeTheme === 'dark') {
                themeIcon.innerHTML = `
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                `;
            } else {
                themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
            }
        }
    </script>
</body>
</html>
